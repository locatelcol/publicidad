<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .label span {
      color: var(--accent);
    }

    .player-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid #222;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(232,255,71,0.06), 0 20px 60px rgba(0,0,0,0.6);
    }

    video {
      width: 100%;
      display: block;
      max-height: 70vh;
      background: #000;
    }

    /* Loading state */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    .loader.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #222;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.2rem 0;
    }

    .meta-title {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 2px;
      opacity: 0.7;
    }

    .error-msg {
      text-align: center;
      padding: 3rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .error-msg strong {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: #ff4747;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="label">REPRO<span>DUCTOR</span></div>

  <div class="player-wrap" id="playerWrap">
    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>
    <video id="videoEl" controls playsinline></video>
  </div>

  <div class="meta">
    <span class="meta-title" id="videoTitle">Cargando...</span>
    <span class="badge" id="modoBadge">AUTO</span>
  </div>
</div>

<script>
  const video = document.getElementById('videoEl');
  const loader = document.getElementById('loader');
  const titleEl = document.getElementById('videoTitle');
  const badge = document.getElementById('modoBadge');
  const wrap = document.getElementById('playerWrap');

  // Carga config.json desde la misma carpeta
  fetch('./config.json?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('No se encontró config.json');
      return r.json();
    })
    .then(cfg => {
      video.src = cfg.video_url;
      titleEl.textContent = cfg.titulo || 'Video';
      badge.textContent = cfg.loop ? 'LOOP' : 'AUTO';

      if (cfg.loop) video.loop = true;

      video.addEventListener('canplay', () => {
        loader.classList.add('hidden');
        if (cfg.autoplay) {
          video.play().catch(() => {
            // Autoplay bloqueado por el navegador — ok, el usuario puede presionar play
          });
        }
      });

      video.addEventListener('error', () => {
        loader.classList.add('hidden');
        wrap.innerHTML = '<div class="error-msg"><strong>ERROR</strong>No se pudo cargar el video. Verifica la URL en config.json.</div>';
      });

      video.load();
    })
    .catch(err => {
      loader.classList.add('hidden');
      wrap.innerHTML = `<div class="error-msg"><strong>ERROR</strong>${err.message}</div>`;
      titleEl.textContent = 'Error de configuración';
    });
</script>

</body>
</html>
