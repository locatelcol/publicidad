<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Fullscreen</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain; /* 👈 CAMBIO CLAVE */
      background: #000;
    }
  </style>
</head>
<body>

<video 
  id="videoEl"
  autoplay 
  muted 
  loop 
  playsinline
></video>

<script>
  const video = document.getElementById('videoEl');

  fetch('./config.json?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('No se encontró config.json');
      return r.json();
    })
    .then(cfg => {
      video.src = cfg.video_url;

      // IMPORTANTE: autoplay solo funciona si está muteado
      if (cfg.autoplay) {
        video.muted = true; // 🔑 clave para que funcione autoplay
        video.play().catch(() => {});
      }

      if (cfg.loop) video.loop = true;

      video.load();
    })
    .catch(err => {
      console.error(err);
    });
</script>

</body>
</html>
